services:
  web:
    image: php:8.2-apache
    container_name: clutchone_web
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
    depends_on:
      - db

  db:
    image: mysql:8.0
    container_name: clutchone_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: produtos
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./produtos.sql:/docker-entrypoint-initdb.d/produtos.sql

volumes:
  db_data: